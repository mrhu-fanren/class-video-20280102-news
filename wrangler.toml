name = "class2-news"
pages_build_output_dir = "site"
compatibility_date = "2024-09-23"

# 注意：本仓库通过 GitHub 连接部署（Pages + Git），
# KV 绑定（变量名 NEWS_KV）请在 Cloudflare 后台设置：
#   项目 -> Settings -> Variables and Secrets -> KV namespace bindings -> 添加
# 不要在 wrangler.toml 里写占位 ID，否则函数发布会报 "Invalid KV namespace ID"。
