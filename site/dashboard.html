<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>数据看板 · 初2028届2班新闻电台</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <div class="logo">
        <span class="dot"></span>
        <div>新闻电台<small>数据看板</small></div>
      </div>
      <nav class="nav"><a href="index.html">返回首页</a></nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <h3>📊 班级数据收集</h3>
      <div class="hint">本页仅供班主任/管理员查看，密码：liulaoshi</div>
      <div class="src-banner" id="srcBanner">正在检测数据来源…</div>

      <div class="stat-grid" id="stats"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap">初2028届2班 · 新闻电台 ｜ 数据看板</div>
  </footer>

  <script src="js/store.js"></script>
  <script>
    // ---- 看板独立密码门（密码由后端 stats 接口校验）----
    (function () {
      function stat(n, l) {
        return '<div class="stat"><div class="num">' + n + '</div><div class="lbl">' + l + '</div></div>';
      }
      function renderDash(stats) {
        var visits = stats.visits || [];
        var gb = stats.guestbook || [];
        var cmt = stats.commentCount || 0;

        // 访问指标
        document.getElementById("stats").innerHTML =
          stat(stats.totalVisits != null ? stats.totalVisits : visits.length, "总访问次数") +
          stat(stats.dailyVisits != null ? stats.dailyVisits : 0, "每日访问总次数") +
          stat(stats.dailyPeople != null ? stats.dailyPeople : 0, "每日访问总人数") +
          stat(stats.totalPeople != null ? stats.totalPeople : 0, "访问总人数") +
          stat(stats.failedAttempts != null ? stats.failedAttempts : 0, "密码错误次数") +
          stat(cmt, "视频评论数") +
          stat(stats.guestbookCount != null ? stats.guestbookCount : gb.length, "留言板条数");
      }

      var gate = document.createElement("div");
      gate.id = "gate";
      gate.innerHTML =
        '<div class="box"><div class="lock">🛡️</div>' +
        '<h2>数据看板</h2><p>请输入管理密码</p>' +
        '<input id="dpw" type="password" placeholder="管理密码" autocomplete="off" />' +
        '<button id="denter">查看</button><div class="err" id="derr"></div></div>';
      document.body.appendChild(gate);
      document.body.style.overflow = "hidden";
      var input = gate.querySelector("#dpw");
      var err = gate.querySelector("#derr");
      input.focus();
      function go() {
        var pw = input.value.trim();
        if (!pw) { err.textContent = "请输入密码。"; return; }
        Store.getStats(pw).then(function (stats) {
          if (!stats || stats.error === "unauthorized") {
            err.textContent = "密码错误。"; input.value = ""; input.focus(); return;
          }
          gate.remove(); document.body.style.overflow = "";
          renderDash(stats);
          updateSource();
        });
      }
      function updateSource() {
        var b = document.getElementById("srcBanner");
        if (!b) return;
        Store.ping().then(function (result) {
          b.className = result.ok ? "src-banner ok" : "src-banner warn";
          b.textContent = result.msg;
        });
      }
      gate.querySelector("#denter").addEventListener("click", go);
      input.addEventListener("keydown", function (e) { if (e.key === "Enter") go(); });
    })();
  </script>
</body>
</html>
