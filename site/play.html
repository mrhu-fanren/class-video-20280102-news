<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>播放 · 初2028届2班新闻电台</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <div class="logo">
        <span class="dot"></span>
        <div>新闻电台<small>初2028届 · 2班</small></div>
      </div>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="videos.html">视频专区</a>
        <a href="index.html#about">关于</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="player-card" id="stage"><!-- 由脚本渲染 --></section>

    <section class="section comment-section">
      <h3>💬 评论区 <span class="cmt-count" id="cmtCount">0 条评论</span></h3>
      <div class="hint">就这期新闻和大家交流一下吧～</div>
      <div id="cmtList" class="gb-list" style="margin:16px 0 24px;"></div>
      <form id="cmtForm" class="gb-form">
        <input id="cmtName" type="text" maxlength="20" placeholder="你的昵称（选填，留空则显示为「匿名」）" autocomplete="off" />
        <textarea id="cmtText" rows="3" placeholder="写下你的评论…" required></textarea>
        <button type="submit">发表评论</button>
      </form>
    </section>

    <p style="margin-bottom:30px;"><a href="videos.html" style="color:var(--brand);">← 返回视频专区</a></p>
  </main>

  <div class="feedback-bar">
    <a href="#guestbook" onclick="setTimeout(function(){var t=document.getElementById('gb-text');if(t)t.focus();},300)">📮 问题建议反馈</a>
  </div>

  <footer class="footer">
    <div class="wrap">初2028届2班 · 新闻电台 ｜ 班级内部交流用途，请勿外传 ｜ <a href="dashboard.html" style="color:var(--ink-soft);text-decoration:underline;">数据看板</a></div>
  </footer>

  <div id="guestbook" style="max-width:960px;margin:0 auto 30px;padding:0 20px;"></div>

  <script src="js/store.js"></script>
  <script src="js/videos.js"></script>
  <script src="js/gate.js"></script>
  <script src="js/guestbook.js"></script>
  <script>
    (async function () {
      var params = new URLSearchParams(location.search);
      var id = params.get("id");
      var v = (window.VIDEOS || []).filter(function (x) { return x.id === id; })[0];
      var stage = document.getElementById("stage");
      if (!v) {
        stage.innerHTML = '<div class="player-meta"><h2>未找到该视频</h2><p class="sub">请返回视频专区重新选择。</p></div>';
        return;
      }
      document.title = v.title + " · 初2028届2班新闻电台";

      // 播放源：走防盗链代理（禁止直接下载/外链）+ 公共缓存（回源一次后边缘节点秒开）
      var videoSrc = v.file;
      try {
        var hr = await fetch("/api/health");
        if (hr.ok) videoSrc = "/api/video?file=" + encodeURIComponent(v.file);
      } catch (e) {}

      stage.innerHTML =
        '<div class="video-wrap">' +
          '<video id="pv" controls playsinline webkit-playsinline preload="metadata" controlsList="nodownload" oncontextmenu="return false;" ondragstart="return false;">' +
            '<source src="' + videoSrc + '" type="video/mp4" />' +
            '您的浏览器不支持视频播放。' +
          '</video>' +
          '<div class="ld-overlay" id="ldOverlay">' +
            '<div class="ld-circle-wrap">' +
              '<svg viewBox="0 0 120 120" class="ld-circle">' +
                '<defs><linearGradient id="ldGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0ea5e9"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs>' +
                '<circle class="ld-bg" cx="60" cy="60" r="52"/>' +
                '<circle class="ld-fg" id="ldFg" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="326.73" stroke="url(#ldGrad)"/>' +
              '</svg>' +
              '<div class="ld-center" id="ldCenter">&#9654;<br><span class="ld-sub">点击播放</span></div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="player-meta">' +
          '<h2>' + v.title + '</h2>' +
          '<div class="sub">发布日期：' + v.date + '</div>' +
          '<div class="tags">' +
            (v.hosts || []).map(function (h) { return '<span class="tag">' + h + '</span>'; }).join('') +
          '</div>' +
          (v.introOpen
            ? '<p class="intro-full">' + v.desc + '</p>'
            : '<details class="intro"><summary>详细介绍</summary><div class="intro-body">' + v.desc + '</div></details>') +
        '</div>';

      /* ===== 真实加载进度圈（基于实际缓冲字节，平滑 rAF 更新）+ 按需加载 ===== */
      (function () {
        var pv = document.getElementById('pv');
        var overlay = document.getElementById('ldOverlay');
        var fg = document.getElementById('ldFg');
        var center = document.getElementById('ldCenter');
        var circ = 2 * Math.PI * 52;          // 进度圈周长 ≈ 326.73
        var total = 0;                        // 视频总字节（同域 HEAD 探测）
        var started = false;
        var rafId = null;

        // 1) 真实总大小：同域 HEAD 读取 Content-Length（极小开销，不下载正文）
        fetch(videoSrc, { method: 'HEAD' }).then(function (r) {
          var len = r.headers.get('content-length');
          if (len) total = parseInt(len, 10) || 0;
        }).catch(function () {});

        // 真实进度 = 浏览器已缓冲区间末端 / 总时长
        function paint() {
          try {
            var d = pv.duration || 0, b = pv.buffered;
            if (b && b.length && d && d > 0) {
              var end = b.end(b.length - 1);
              var pct = Math.min(100, Math.max(0, (end / d) * 100));
              if (fg) fg.style.strokeDashoffset = circ * (1 - pct / 100);
              if (center) {
                center.innerHTML = pct >= 100 ? '加载完成' : Math.round(pct) + '%';
              }
              return pct;
            }
          } catch (e) {}
          if (center && !started) {
            center.innerHTML = '&#9654;<br><span class="ld-sub">点击播放</span>';
          }
          return 0;
        }
        // 2) requestAnimationFrame 循环：overlay 可见时高频更新进度圈
        function startRaf() {
          if (rafId) return;
          function tick() {
            paint();
            if (!overlay.classList.contains('hide')) {
              rafId = requestAnimationFrame(tick);
            } else {
              rafId = null;
            }
          }
          rafId = requestAnimationFrame(tick);
        }
        function begin() {
          if (started) return;
          started = true;
          pv.preload = 'auto';              // 按需加载：用户点击后才开始拉流
          var p = pv.play();
          if (p && p.catch) p.catch(function () {});
          startRaf();
        }
        overlay.addEventListener('click', function () { begin(); });
        pv.addEventListener('progress', paint);
        pv.addEventListener('loadedmetadata', paint);
        pv.addEventListener('timeupdate', paint);
        pv.addEventListener('waiting', function () { overlay.classList.remove('hide'); startRaf(); });
        pv.addEventListener('stalled', function () { overlay.classList.remove('hide'); });
        pv.addEventListener('playing', function () {
          paint();
          if (!pv.paused) setTimeout(function () { if (!pv.paused) overlay.classList.add('hide'); }, 500);
        });
        // 初始启动循环（显示"▶ 点击播放"状态）
        startRaf();
      })();

      var vid = v.id;

      async function renderComments() {
        var list = await Store.getComments(vid);
        document.getElementById("cmtCount").textContent = list.length + " 条评论";
        document.getElementById("cmtList").innerHTML = list.length
          ? list.map(function (c) {
              return '<div class="gb-item">' +
                '<div class="gb-meta"><b>' + Store.esc(c.name || "匿名") + '</b>' +
                '<span>' + Store.fmt(c.time) + '</span></div>' +
                '<div class="gb-text">' + Store.esc(c.text) + '</div>' +
              '</div>';
            }).join("")
          : '<p class="gb-empty">还没有评论，来做第一个发言的人吧～</p>';
      }
      renderComments();

      document.getElementById("cmtForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        var ta = document.getElementById("cmtText");
        var nameEl = document.getElementById("cmtName");
        var t = ta.value.trim();
        if (!t) return;
        var nm = nameEl ? nameEl.value.trim() : "";
        await Store.addComment(vid, t, nm);
        ta.value = "";
        if (nameEl) nameEl.value = "";
        renderComments();
      });
    })();
  </script>
</body>
</html>
