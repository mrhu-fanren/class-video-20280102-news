<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>评论区 · 初2028届2班新闻电台</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <div class="logo">
        <span class="dot"></span>
        <div>新闻电台<small>初2028届 · 2班</small></div>
      </div>
      <nav class="nav">
        <a href="index.html">首页</a>
        <a href="videos.html">视频专区</a>
        <a href="index.html#about">关于</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="section">
      <h3 id="ctitle">评论区</h3>
      <div class="hint">就这期新闻和大家交流一下吧～</div>
      <div id="clist" class="gb-list" style="margin:16px 0 24px;"></div>

      <form id="cform" class="gb-form">
        <textarea id="ctext" rows="3" placeholder="写下你的评论…（需先登录名字）" required></textarea>
        <button type="submit">发表评论</button>
      </form>
      <p style="margin-bottom:30px;"><a href="videos.html" style="color:var(--brand);">← 返回视频专区</a></p>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap">初2028届2班 · 新闻电台 ｜ 班级内部交流用途，请勿外传</div>
  </footer>

  <script src="js/store.js"></script>
  <script src="js/gate.js"></script>
  <script>
    (async function () {
      var params = new URLSearchParams(location.search);
      var vid = params.get("vid");
      var v = (window.VIDEOS || []).filter(function (x) { return x.id === vid; })[0];
      var titleEl = document.getElementById("ctitle");
      titleEl.textContent = v ? ("评论区 · " + v.title) : "评论区";
      document.title = titleEl.textContent + " · 初2028届2班新闻电台";

      async function render() {
        var list = await Store.getComments(vid);
        document.getElementById("clist").innerHTML = list.length
          ? list.map(function (c) {
              return '<div class="gb-item">' +
                '<div class="gb-meta"><b>' + Store.esc(c.name || "匿名") + '</b>' +
                '<span>' + Store.fmt(c.time) + '</span></div>' +
                '<div class="gb-text">' + Store.esc(c.text) + '</div>' +
              '</div>';
            }).join("")
          : '<p class="gb-empty">还没有评论，来做第一个发言的人吧～</p>';
      }
      render();

      document.getElementById("cform").addEventListener("submit", async function (e) {
        e.preventDefault();
        var ta = document.getElementById("ctext");
        var t = ta.value.trim();
        if (!t) return;
        if (!Store.hasName()) {
          alert("请先回到首页输入密码并登录名字，再来评论～");
          location.href = "index.html";
          return;
        }
        await Store.addComment(vid, t);
        ta.value = "";
        render();
      });
    })();
  </script>
</body>
</html>
